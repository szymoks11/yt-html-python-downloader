<!DOCTYPE html>
<html>
   <head>
      <title>Youtube Downloader</title>
      <link rel="stylesheet" href="css/general.css">
      <link rel="stylesheet" href="css/main.css">
   </head>
   <body>
      <div class="mid">
      <div id="header">
         <div class="title">
            <a href="https://github.com/szymoks11/yt-html-python-downloader" target="_blank"><img src="favicon.ico" /></a>
            <a href="https://github.com/szymoks11/yt-html-python-downloader" target="_blank">
               <h1>Youtube Downloader</h1>
            </a>
         </div>
         <div class="extra-links">
            <a href="https://github.com/szymoks11/yt-html-python-downloaderr" target="_blank">
            GitHub
            <img src="https://github.githubassets.com/favicons/favicon.png" alt="GitHub favicon" />
            </a>
         </div>
      </div>
      <div>
         <h2>Video</h2>
         <div class="filepath-browse-layout">
            <input id="link" placeholder="Search" required>
         </div>
      </div>
      <div>
      <h2>
         <span>Options</span>
      </h2>
      <div class="Buttons">
         <button id="audio" class="large">
         Only Audio
         </button>
         <button id="clip" class="large">
         Clip
         </button>
         <div id="start" hidden>Start
            <input id="start_input"type="text" />
         </div>
         <div id="stop" hidden>Stop
            <input id="stop_input" type="text" />
         </div>
      </div>
      <div id="section-settings">
         <div class="header noselect" onclick="expandSection('settings')">
            <img src="img/chevron-square-up.svg" alt="Advanced Section Chevron"/>
            <h2>Settings</h2>
         </div>
         <div class="content">
            <div>
               <div class="option-container input">
                  <span>
                  <span>Output Directory</span>
                  <span title="The directory to put the output in. Will be created if it doesn't exist" class="info_icon"></span>
                  </span>
                  <div class="filepath-browse-layout">
                     <input id="output-directory" placeholder="DIRECTORY">
                     <button onclick="getResult()" id="output-directory-search" >Browse</button>
                  </div>
               </div>
               <div class="option-container input"><span>Custom Name<span class="info_icon"></span></span><input id="name_input" placeholder="VALUE"></div>
            </div>
         </div>
         <div id="Download-button-wrapper">
            <button type="button" id="Download-button" onclick="summation()">
            Download
            </button>
         </div>
      </div>
      <script type="text/javascript" src="eel.js"></script>
      <script type="text/javascript" src="js/main.js"></script>
      <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
      <script type="text/javascript" src="js/my_jquery.js"></script>
   </body>
</html>
